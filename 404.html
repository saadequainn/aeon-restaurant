<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | ÆON</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to ÆON.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Playfair Display', Georgia, serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      font-style: italic;
      color: #d4a574;
      line-height: 1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #d4a574, #a67c52);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      margin-bottom: 1rem;
      color: #fff;
    }
    p {
      color: #888;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      background: #d4a574;
      color: #0a0a0a;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: #e8c39e;
      transform: translateY(-2px);
    }
    .deco-line {
      width: 60px;
      height: 1px;
      background: #d4a574;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <div class="deco-line"></div>
    <p>The page you're looking for has wandered off the menu.<br>Let us guide you back.</p>
    <a href="/" class="btn">
      Return Home
      <span>→</span>
    </a>
  </div>
</body>
</html>
